server:
  port: 8080
  mode: debug  # debug, release
  read_timeout: 60
  write_timeout: 60

database:
  host: localhost
  port: 5432
  user: admin
  password: admin123
  dbname: asset_management
  sslmode: disable
  max_open: 100
  max_idle: 10

